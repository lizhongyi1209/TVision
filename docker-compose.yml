# TVision 在线部署。
# 本机（o1key 生产服务器）nginx 已占用 80/443 并服务其他域名，所以不用 Caddy——
# app 只绑 127.0.0.1:3002，TLS 与反代由宿主机 nginx 的 tvision.o1key.com vhost 承担
# （/etc/nginx/conf.d/tvision.o1key.com.conf，与 api/key.o1key.com 同一套模式）。
# 另有全球加速域名 tvision.o1key.cn（腾讯 EdgeOne 回源同一后端，
# /etc/nginx/conf.d/tvision.o1key.cn.conf，80 不跳 HTTPS，与 whm.o1key.cn 同模式）。
# 数据全在 tvision-data 卷（SQLite + workflow 文件 + 本地媒体回退），记得定期备份。
#
# 独立服务器上想用 Caddy 自动 HTTPS 的话，见 git 历史里带 caddy 服务的版本。

# 显式锁定 Compose 项目名，避免依赖当前目录名（历史部署曾用 o1key-vision-workbench，
# 与目录名 tvision 不一致，裸跑 docker compose 会误建空卷/撞端口）。锁死后，
# 无论在哪个目录、加不加 -p，都指向同一套容器和 tvision_tvision-data 数据卷。
name: tvision

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
      - OUTPUT_DIR=/data/output
    volumes:
      - tvision-data:/data
    ports:
      - "127.0.0.1:3002:3000"

volumes:
  # 卷由数据迁移时手动建好并灌入历史数据（原 o1key-vision-workbench_tvision-data），
  # external 让 Compose 直接采用它、不再尝试自建（否则会告警）。完整名 = 项目名_键名 = tvision_tvision-data。
  tvision-data:
    external: true
    name: tvision_tvision-data
